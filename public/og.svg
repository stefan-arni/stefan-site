<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eda9e" />
      <stop offset="50%" stop-color="#7b8cde" />
      <stop offset="100%" stop-color="#c97bb5" />
    </linearGradient>
    <linearGradient id="auroraGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eda9e" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#7b8cde" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#c97bb5" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117" />

  <!-- Subtle aurora glow at top -->
  <rect x="0" y="0" width="1200" height="120" fill="url(#auroraGlow)" />

  <!-- Aurora gradient line at top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#aurora)" />

  <!-- Cursor prompt -->
  <text x="80" y="280" font-family="'JetBrains Mono', monospace" font-size="22" fill="#5eda9e" opacity="0.6">&gt;_</text>

  <!-- Name -->
  <text x="80" y="340" font-family="'Syne', sans-serif" font-weight="700" font-size="56" fill="#e0e4e8">Stefan Arni Arnarsson</text>

  <!-- Subtitle -->
  <text x="80" y="395" font-family="'DM Sans', sans-serif" font-weight="400" font-size="28" fill="#7a8194">ML engineer. Cornell Tech MEng.</text>

  <!-- Subtle bottom accent line -->
  <rect x="80" y="430" width="160" height="2" fill="url(#aurora)" opacity="0.5" />
</svg>
